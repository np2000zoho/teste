name: SSH Runner

on:
  workflow_dispatch:

jobs:
  runner:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar SSH
        run: |
          sudo apt update
          sudo apt install -y openssh-server

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys

      - name: Iniciar SSH
        run: |
          sudo service ssh start

      - name: Mostrar IP
        run: |
          curl ifconfig.me

      - name: Manter runner vivo
        run: |
          sleep 21600
