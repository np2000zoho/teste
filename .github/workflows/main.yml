name: SSH Runner with SOCKS Proxy

on:
  workflow_dispatch:

jobs:
  runner:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar SSH e dependências
        run: |
          sudo apt update
          sudo apt install -y openssh-server ufw curl net-tools

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys

          # Configurações recomendadas
          sudo sed -i 's/#PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
          sudo sed -i 's/#AllowTcpForwarding.*/AllowTcpForwarding yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PermitTunnel.*/PermitTunnel yes/' /etc/ssh/sshd_config
          echo "AllowUsers runner" | sudo tee -a /etc/ssh/sshd_config

          sudo systemctl restart ssh

      - name: Liberar portas no firewall
        run: |
          sudo ufw --force reset
          sudo ufw default deny incoming
          sudo ufw default allow outgoing
          sudo ufw allow 22/tcp
          sudo ufw --force enable
          
      - name: Mostrar informações
        run: |
          echo "IP Público: $(curl -s ifconfig.me)"
          echo "Usuário: $(whoami)"
          ip addr show eth0

      - name: Manter vivo
        run: sleep 21600
