name: SSH Runner com Bore

on:
  workflow_dispatch:

jobs:
  runner:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar dependências
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl

      - name: Configurar SSH com chave pública
        run: |
          # Criar diretório com permissões corretas
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Adicionar a chave pública (com tratamento de formatação)
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys

          # Configurações importantes do SSH
          sudo sed -i 's/#PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
          sudo sed -i 's/#PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#AuthorizedKeysFile.*/AuthorizedKeysFile .ssh\/authorized_keys/' /etc/ssh/sshd_config
          sudo sed -i 's/#AllowTcpForwarding.*/AllowTcpForwarding yes/' /etc/ssh/sshd_config

          echo "AllowUsers runner" | sudo tee -a /etc/ssh/sshd_config

          # Reiniciar SSH
          sudo systemctl restart ssh

          echo "=== Verificação SSH ==="
          ls -la ~/.ssh/
          cat ~/.ssh/authorized_keys

      - name: Instalar e iniciar Bore
        run: |
          # Baixar Bore de forma confiável
          BORE_VERSION=$(curl -s https://api.github.com/repos/ekzhang/bore/releases/latest | grep '"tag_name"' | cut -d '"' -f 4)
          echo "Baixando Bore $BORE_VERSION"
          
          curl -L -o bore.tar.gz "https://github.com/ekzhang/bore/releases/download/${BORE_VERSION}/bore-${BORE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          
          tar -xzf bore.tar.gz
          chmod +x bore
          
          echo "🚀 Iniciando túnel Bore..."
          ./bore local 22 --to bore.pub > bore.log 2>&1 &
          
          sleep 8

          echo "======================================"
          echo "✅ MÁQUINA PRONTA!"
          echo "IP: $(curl -s ifconfig.me)"
          echo ""
          echo "=== Link do Bore ==="
          grep -o 'bore.pub:[0-9]*' bore.log | head -n 1 || cat bore.log
          echo "======================================"

      - name: Manter runner vivo
        run: sleep 21600
